pages:
  stage: deploy
  image: python:3.12-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends groff
    - pip install markdown
  script:
    - python3 tools/build-docs.py public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
